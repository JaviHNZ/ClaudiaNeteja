<div class="container py-4">
  <!-- 🔙 BOTÓN VOLVER -->
  <button class="btn btn-outline-secondary mb-3" routerLink="/admin">
    ← Volver
  </button>
  <!-- 🔝 CONTROL MES -->
  <div class="d-flex justify-content-center align-items-center gap-3 mb-4">

    <button class="btn btn-light" (click)="cambiarMes(-1)">
      ←
    </button>

    <div class="fw-bold fs-5">
      {{ getNombreMes() }} {{ anioActual }}
    </div>

    <button class="btn btn-light" (click)="cambiarMes(1)">
      →
    </button>

  </div>

  <!-- 🧾 TITULO -->
  <h2 class="text-center mb-4">👤 Detalle trabajador</h2>

  <!-- 🔥 LISTA -->
  <div *ngIf="registrosFiltrados.length > 0; else sinDatos">

    <div *ngFor="let r of registrosFiltrados" class="card shadow-sm mb-3">

      <div class="card-body d-flex justify-content-between align-items-center">

        <!-- INFO -->
        <div>
          <div class="fw-bold text-primary">
            🏠 {{ r.casa_nombre }}
          </div>

          <div class="text-muted small">
            📅 {{ formatearFecha(r.fecha) }}
          </div>
        </div>

        <!-- HORAS -->
        <div class="text-success fw-bold">
          ⏱ {{ formatearHoras(r.horas) }}
        </div>

      </div>

    </div>

    <!-- 🔥 TOTAL -->
    <div class="alert alert-success mt-4 text-center">
      🧮 Total del mes:
      <strong>{{ formatearHoras(getTotalMes()) }}</strong>
    </div>

  </div>

  <!-- ❌ VACIO -->
  <ng-template #sinDatos>
    <div class="text-center text-muted mt-5">
      No hay registros para este trabajador
    </div>
  </ng-template>

</div>
