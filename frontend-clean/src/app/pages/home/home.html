<div class="container py-5 text-center">

  <!-- 👋 SALUDO -->
  <h1 class="mb-3">Hola {{ nombre }} 👋</h1>
  <p class="text-muted mb-5">¿Qué quieres hacer hoy?</p>

  <!-- 🔥 OPCIONES -->
  <div class="row justify-content-center g-4">

    <!-- REGISTROS -->
    <div class="col-12 col-sm-6 col-md-4">
      <div class="card opcion shadow-sm h-100" (click)="irRegistros()">
        <div class="card-body d-flex flex-column justify-content-center">
          <div class="fs-1 mb-3">📝</div>
          <div class="fw-bold">Registrar horas</div>
        </div>
      </div>
    </div>

    <!-- ADMIN -->
    <div 
      class="col-12 col-sm-6 col-md-4"
      *ngIf="rol === 'admin'"
    >
      <div class="card opcion admin shadow-sm h-100" (click)="irAdmin()">
        <div class="card-body d-flex flex-column justify-content-center">
          <div class="fs-1 mb-3">👑</div>
          <div class="fw-bold">Panel Admin</div>
        </div>
      </div>
    </div>

  </div>

</div>
