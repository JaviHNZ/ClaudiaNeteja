<div class="container py-4">

  <h2 class="text-center mb-4">📝 Registrar horas</h2>

  <!-- 🔥 FORM -->
  <div class="card p-3 shadow-sm mb-4">

    <div class="row g-2">

      <!-- FECHA -->
      <div class="col-12 col-md-3">
        <input [(ngModel)]="fecha" type="date" class="form-control">
      </div>

      <!-- CASA -->
      <div class="col-12 col-md-4 position-relative">
        <input 
          type="text" 
          [(ngModel)]="busquedaCasa" 
          (input)="buscarCasa()" 
          placeholder="Buscar casa..." 
          class="form-control"
        />

        <!-- AUTOCOMPLETE -->
        <div *ngIf="resultadosCasas.length > 0" class="list-group position-absolute w-100">
          <button 
            *ngFor="let c of resultadosCasas" 
            (mousedown)="seleccionarCasa(c)"
            class="list-group-item list-group-item-action"
          >
            {{ c.nombre }}
          </button>
        </div>
      </div>

      <!-- HORAS -->
      <div class="col-6 col-md-2">
        <input 
          type="number" 
          [(ngModel)]="horasInput" 
          placeholder="Horas"
          class="form-control"
        >
      </div>

      <!-- MINUTOS -->
      <div class="col-6 col-md-1">
        <input 
          type="number" 
          [(ngModel)]="minutosInput" 
          placeholder="Min"
          max="59"
          class="form-control"
        >
      </div>

      <!-- BOTÓN -->
      <div class="col-12 col-md-2">
        <button class="btn btn-primary w-100" (click)="guardar()">
          Guardar
        </button>
      </div>

    </div>

  </div>

  <!-- 📅 MES -->
  <div class="d-flex justify-content-center align-items-center gap-3 mb-3">
    <button class="btn btn-light" (click)="cambiarMes(-1)">←</button>

    <div class="fw-bold">
      {{ getNombreMes() }} {{ anioActual }}
    </div>

    <button class="btn btn-light" (click)="cambiarMes(1)">→</button>
  </div>

  <!-- 📊 TOTAL -->
  <div class="alert alert-info text-center">
    ⏱ Total del mes: 
    <strong>{{ formatearHoras(getTotalHorasMes()) }}</strong>
  </div>

  <h4 class="mb-3">📋 Mis registros</h4>

  <!-- 🔥 LISTA -->
  <div *ngFor="let r of getRegistrosMes()" class="card shadow-sm mb-2">

    <div class="card-body d-flex justify-content-between align-items-center flex-wrap">

      <!-- INFO -->
      <div>
        <div class="fw-bold">📅 {{ formatearFecha(r.fecha) }}</div>
        <div class="text-muted">🏠 {{ r.casa_nombre }}</div>
      </div>

      <!-- NORMAL -->
      <div *ngIf="editandoId !== r.id" class="d-flex align-items-center gap-2">

        <div class="text-success fw-bold">
          ⏱ {{ formatearHoras(r.horas) }}
        </div>

        <button class="btn btn-sm btn-outline-primary" (click)="iniciarEdicion(r)">
          ✏️
        </button>

        <button class="btn btn-sm btn-outline-danger" (click)="eliminar(r.id)">
          🗑
        </button>

      </div>

      <!-- EDITANDO -->
      <div *ngIf="editandoId === r.id" class="d-flex gap-2">

        <input 
          type="number" 
          [(ngModel)]="horasInput" 
          class="form-control form-control-sm"
          style="width: 70px;"
        >

        <input 
          type="number" 
          [(ngModel)]="minutosInput" 
          max="59"
          class="form-control form-control-sm"
          style="width: 70px;"
        >

        <button class="btn btn-sm btn-success" (click)="guardarEdicion(r.id)">
          💾
        </button>

      </div>

    </div>

  </div>

  <!-- 📄 PDF -->
  <div class="text-center mt-4">
    <button class="btn btn-success" (click)="generarPDF()">
      📄 Descargar PDF
    </button>
  </div>

</div>
