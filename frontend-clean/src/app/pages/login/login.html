<div class="login-container">
  <div class="login-card">

    <h2>🔐 Iniciar sesión</h2>

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="email"
    />

    <input
      type="password"
      placeholder="Contraseña"
      [(ngModel)]="password"
    />

    <button (click)="login()">Entrar</button>

  </div>
</div>
