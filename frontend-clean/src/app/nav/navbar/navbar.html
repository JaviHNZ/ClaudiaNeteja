<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">

  <!-- LOGO -->
  <a class="navbar-brand fw-bold" routerLink="/">
    Claudia Neteja
  </a>

  <!-- ☰ BOTÓN HAMBURGUESA -->
  <button 
    class="navbar-toggler" 
    type="button" 
    data-bs-toggle="collapse" 
    data-bs-target="#navbarNav"
  >
    <span class="navbar-toggler-icon"></span>
  </button>

  <!-- CONTENIDO -->
  <div class="collapse navbar-collapse" id="navbarNav">

    <!-- IZQUIERDA -->
    <ul class="navbar-nav me-auto">

      <!-- NO LOGUEADO -->
      <ng-container *ngIf="!isLogged()">
        <li class="nav-item">
          <a class="nav-link" routerLink="/login">Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/register">Register</a>
        </li>
      </ng-container>

      <!-- LOGUEADO -->
      <ng-container *ngIf="isLogged()">
        <li class="nav-item">
          <a class="nav-link" routerLink="/home">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/registros">Registros</a>
        </li>

        <!-- ADMIN -->
        <li class="nav-item" *ngIf="rol === 'admin'">
          <a class="nav-link" routerLink="/admin">Admin</a>
        </li>
      </ng-container>

    </ul>

    <!-- DERECHA -->
    <div class="d-flex align-items-center gap-2" *ngIf="isLogged()">

      <span class="text-white small">
        👤 {{ nombre }}
      </span>

      <button class="btn btn-sm btn-outline-light" (click)="toggleTema()">
        🌙
      </button>

      <button class="btn btn-sm btn-danger" (click)="logout()">
        Salir
      </button>

    </div>

  </div>

</nav>
